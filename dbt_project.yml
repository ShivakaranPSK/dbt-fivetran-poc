name: 'dbt_snowflake_poc'
version: '1.0.0'
config-version: 2


profile: 'default'


model-paths: ["dbt/models"]
analysis-paths: ["dbt/analyses"]
test-paths: ["dbt/tests"]
seed-paths: ["dbt/seeds"]
macro-paths: ["dbt/macros"]
snapshot-paths: ["dbt/snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

on-run-end:
  - "{{ log_model_runs(results) }}"

models:
  dbt_snowflake_poc:
    01_stage:
      wealth:
        +database: "{{ env_var('DBT_ENV_PROVIDER_SYSTEMS') }}"
        +schema: WEALTH_ARCHIVE
        +materialized: table
      vendor_db:
        +database: "{{ env_var('DBT_ENV_PROVIDER_SYSTEMS') }}"
        +schema: VENDOR_DB_ARCHIVE
        +materialized: table

    02_integration:
      wealth:
        Account:
          +database: "{{ env_var('DBT_ENV_DATAPLATFORM_INTEGRATIONS') }}"
          +schema: ACCOUNT
          +materialized: table
        Client:
          +database: "{{ env_var('DBT_ENV_DATAPLATFORM_INTEGRATIONS') }}"
          +schema: CLIENT
          +materialized: table
        Fund:
          +database: "{{ env_var('DBT_ENV_DATAPLATFORM_INTEGRATIONS') }}"
          +schema: FUND
          +materialized: table
        Transaction:
          +database: "{{ env_var('DBT_ENV_DATAPLATFORM_INTEGRATIONS') }}"
          +schema: TRANSACTION
          +materialized: table

    04_deployments:
      +enabled: true
      +materialized: 'ephemeral'