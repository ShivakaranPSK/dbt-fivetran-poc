
name: 'dbt_snowflake_poc'
version: '1.0.0'
config-version: 2


profile: 'default'


model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"



models:
  dbt_snowflake_poc:
    01_stage:
      wealth:
        +database: "{{ env_var('DBT_ENV_PROVIDER_SYSTEMS') }}"
        +schema: WEALTH
        +materialized: table
      vendor_db:
        +database: "{{ env_var('DBT_ENV_PROVIDER_SYSTEMS') }}"
        +schema: VENDOR_DB
        +materialized: table

    04_deployments:
      +enabled: true
      +materialized: 'ephemeral'